<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" style="background-color: #f5f5f5;">
  <!-- Main Title -->
  <text x="600" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#0078d4">
    OSCAR: Operations Security &amp; Compliance Automated Reporter
  </text>

  <!-- Subtitle -->
  <text x="600" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#333">
    Powered by Microsoft Security Copilot | Automated Daily Compliance Reporting
  </text>

  <!-- SCU Optimization Banner -->
  <rect x="200" y="85" width="800" height="40" rx="8" fill="#7fba00" stroke="#5e8700" stroke-width="3"/>
  <text x="600" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
    ⚡ Maximize Your FREE 400 SCUs Monthly! ~30 SCUs = Daily Automated Compliance Reports
  </text>

  <!-- Security Copilot Agent -->
  <g id="copilot">
    <rect x="50" y="150" width="280" height="210" rx="10" fill="#0078d4" stroke="#005a9e" stroke-width="3"/>
    <text x="190" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
      🤖 Security Copilot Agent
    </text>
    <text x="190" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">
      Compliance&amp;SecOpsAutomatedReportingAgent
    </text>

    <!-- KQL Queries -->
    <rect x="70" y="230" width="240" height="115" rx="5" fill="#ffffff" opacity="0.2"/>
    <text x="190" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">
      Over 100 available KQL Compliance Queries
    </text>
    <text x="190" y="268" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
      • Sentinel Data Lake Threat Hunting Report
    </text>
    <text x="190" y="283" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
      • NIST/CIS Compliance Report
    </text>
    <text x="190" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
      • MITRE ATT&amp;CK Report
    </text>
    <text x="190" y="313" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
      • Failed Authentication Report
    </text>
    <text x="190" y="328" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
      • Admin Activity, High Severity Alerts...
    </text>
  </g>

  <!-- Arrow 1: Copilot to Logic App -->
  <g id="arrow1">
    <defs>
      <marker id="arrowhead1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#0078d4" />
      </marker>
    </defs>
    <line x1="330" y1="240" x2="470" y2="240" stroke="#0078d4" stroke-width="3" marker-end="url(#arrowhead1)"/>
    <text x="400" y="214" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#0078d4" font-weight="bold">
      API Call (1 SCU)
    </text>
    <text x="400" y="229" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">
      JSON (in markdown)
    </text>
  </g>

  <!-- Logic App -->
  <g id="logicapp">
    <rect x="470" y="150" width="280" height="300" rx="10" fill="#00a4ef" stroke="#0086bf" stroke-width="3"/>
    <text x="610" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
      ⚡ Azure Logic App
    </text>
    <text x="610" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">
      ComplianceReports-FailedAuth-Copilot
    </text>

    <!-- Trigger -->
    <rect x="490" y="225" width="240" height="40" rx="5" fill="#ffffff" opacity="0.2"/>
    <text x="610" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">
      🕐 Trigger: Recurrence
    </text>
    <text x="610" y="258" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">
      Daily @ 8:00 AM UTC
    </text>

    <!-- Processing Steps -->
    <rect x="490" y="275" width="240" height="160" rx="5" fill="#ffffff" opacity="0.2"/>
    <text x="610" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">
      Processing Steps:
    </text>
    <text x="510" y="315" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="start" fill="white">
      1. Call Security Copilot API
    </text>
    <text x="510" y="335" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="start" fill="white">
      2. Extract JSON from markdown
    </text>
    <text x="510" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="start" fill="white">
      3. Parse JSON to array
    </text>
    <text x="510" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="start" fill="white">
      4. Send to Log Analytics
    </text>
    <text x="510" y="395" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="start" fill="white">
      5. Complete (Status 200)
    </text>
    <text x="610" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle" fill="white" font-style="italic">
      Uses: Azure Log Analytics Data Collector
    </text>
  </g>

  <!-- Arrow 2: Logic App to Sentinel -->
  <g id="arrow2">
    <line x1="750" y1="300" x2="870" y2="300" stroke="#00a4ef" stroke-width="3" marker-end="url(#arrowhead1)"/>
    <text x="810" y="274" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#00a4ef" font-weight="bold">
      Write Data
    </text>
    <text x="810" y="289" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">
      HTTP Data Collector API
    </text>
  </g>

  <!-- Sentinel / Log Analytics -->
  <g id="sentinel">
    <rect x="870" y="150" width="280" height="180" rx="10" fill="#0072c6" stroke="#005a9e" stroke-width="3"/>
    <text x="1010" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
      🛡️ Azure Sentinel
    </text>
    <text x="1010" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">
      Log Analytics Workspace: sentinel
    </text>

    <!-- Table Info -->
    <rect x="890" y="225" width="240" height="90" rx="5" fill="#ffffff" opacity="0.2"/>
    <text x="1010" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">
      📊 ComplianceReports_CL
    </text>
    <text x="1010" y="265" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
      Fields: TimeGenerated, ReportName,
    </text>
    <text x="1010" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
      Severity, ControlID, Framework,
    </text>
    <text x="1010" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">
      FindingType, Status, etc.
    </text>
  </g>

  <!-- Arrow 3: Sentinel to Workbook -->
  <g id="arrow3">
    <line x1="1010" y1="330" x2="1010" y2="460" stroke="#0072c6" stroke-width="3" marker-end="url(#arrowhead1)"/>
    <text x="1040" y="395" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="start" fill="#0072c6" font-weight="bold">
      Query Data
    </text>
    <text x="1040" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="start" fill="#666">
      KQL Queries
    </text>
  </g>

  <!-- Sentinel Workbook -->
  <g id="workbook">
    <rect x="870" y="460" width="280" height="180" rx="10" fill="#50e6ff" stroke="#00b7c3" stroke-width="3"/>
    <text x="1010" y="490" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#003340">
      📈 Sentinel Workbook
    </text>
    <text x="1010" y="515" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#003340">
      (Future Enhancement)
    </text>

    <!-- Dashboard Items -->
    <rect x="890" y="535" width="240" height="90" rx="5" fill="#ffffff" opacity="0.3"/>
    <text x="1010" y="555" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#003340" font-weight="bold">
      Dashboards:
    </text>
    <text x="1010" y="575" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#003340">
      • Compliance Score by Framework
    </text>
    <text x="1010" y="590" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#003340">
      • Control Status Matrix
    </text>
    <text x="1010" y="605" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#003340">
      • Findings Trends, Remediation Tracker
    </text>
  </g>

  <!-- Compliance Frameworks Box -->
  <g id="frameworks">
    <rect x="50" y="370" width="280" height="120" rx="10" fill="#7fba00" stroke="#5e8700" stroke-width="3"/>
    <text x="190" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
      📋 Compliance Frameworks
    </text>
    <text x="190" y="425" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">
      • NIST Cybersecurity Framework 2.0
    </text>
    <text x="190" y="445" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">
      • NIST SP 800-53 Rev 5
    </text>
    <text x="190" y="465" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">
      • CIS Controls v8
    </text>
  </g>

  <!-- Data Sources Box -->
  <g id="datasources">
    <rect x="50" y="520" width="280" height="120" rx="10" fill="#ffb900" stroke="#d39300" stroke-width="3"/>
    <text x="190" y="550" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
      📁 Data Sources
    </text>
    <text x="190" y="575" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">
      SigninLogs • SecurityAlert • AuditLogs
    </text>
    <text x="190" y="595" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">
      SecurityIncident • ThreatIntelligenceIndicator
    </text>
    <text x="190" y="615" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">
      NetworkAnalytics • Update • IdentityInfo
    </text>
  </g>

  <!-- Connections -->
  <g id="connections">
    <rect x="470" y="520" width="280" height="120" rx="10" fill="#e81123" stroke="#a80000" stroke-width="3"/>
    <text x="610" y="550" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
      🔌 API Connections
    </text>
    <text x="610" y="575" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">
      securitycopilot-failedauth
    </text>
    <text x="610" y="595" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">
      azureloganalyticsdatacollector-copilot
    </text>
    <text x="610" y="615" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle" fill="white" font-style="italic">
      (Handles HMAC auth automatically)
    </text>
  </g>

  <!-- Key Features Legend -->
  <g id="legend">
    <rect x="50" y="690" width="1100" height="170" rx="10" fill="#f0f0f0" stroke="#cccccc" stroke-width="2"/>
    <text x="600" y="720" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
      🔑 Key Features &amp; Benefits
    </text>

    <text x="80" y="750" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#0078d4">
      ✅ Automated Daily Execution
    </text>
    <text x="80" y="770" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">
      Logic App triggers at 8 AM UTC
    </text>

    <text x="320" y="750" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#0078d4">
      ✅ 13 Compliance Queries
    </text>
    <text x="320" y="770" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">
      All with audit trail ("No Findings")
    </text>

    <text x="560" y="750" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#0078d4">
      ✅ Multi-Framework Coverage
    </text>
    <text x="560" y="770" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">
      NIST CSF, NIST 800-53, CIS v8
    </text>

    <text x="820" y="750" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#0078d4">
      ✅ Custom Log Analytics Table
    </text>
    <text x="820" y="770" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">
      ComplianceReports_CL
    </text>

    <text x="80" y="800" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#7fba00">
      💰 Cost Efficient
    </text>
    <text x="80" y="820" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">
      ~30 SCUs/month (7.5% of free tier)
    </text>

    <text x="320" y="800" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#7fba00">
      🔒 Secure by Default
    </text>
    <text x="320" y="820" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">
      OAuth + RBAC, no hardcoded secrets
    </text>

    <text x="560" y="800" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#7fba00">
      🧪 Test Infrastructure
    </text>
    <text x="560" y="820" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">
      Static data testing (no SCU usage)
    </text>

    <text x="820" y="800" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#7fba00">
      📝 Comprehensive Docs
    </text>
    <text x="820" y="820" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">
      README + audit log + status
    </text>
  </g>

</svg>
